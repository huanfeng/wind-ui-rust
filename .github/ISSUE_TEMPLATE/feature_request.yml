name: 功能建议 / Feature request
description: 提出新功能或改进 / Propose a feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        较大的改动建议先讨论范围与设计，避免方向不符。
        For larger changes, please discuss scope and design first.
  - type: checkboxes
    attributes:
      label: 前置检查 / Preflight
      options:
        - label: 我已搜索现有 issue，确认未重复 / I searched existing issues and found no duplicate
          required: true
  - type: textarea
    attributes:
      label: 要解决的问题 / Problem
      description: 你遇到了什么场景/痛点？/ What use case or pain point are you hitting?
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望的方案 / Proposed solution
      description: 期望的 API 或行为是怎样的？/ What API or behavior do you envision?
    validations:
      required: true
  - type: textarea
    attributes:
      label: 备选方案 / Alternatives
      description: 是否考虑过其他做法？/ Any alternatives considered?
    validations:
      required: false
  - type: dropdown
    attributes:
      label: 相关平台 / Platform
      multiple: true
      options:
        - 跨平台 / Cross-platform
        - Windows
        - macOS
    validations:
      required: false
